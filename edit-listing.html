<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - განცხადების რედაქტირება</title>
    <link rel="stylesheet" href="css/add-listing-style.css"> 
</head>
<body>
    <div class="add-listing-container">
        <div class="header-link">
            <a href="my-listings.html">← ჩემს განცხადებებში დაბრუნება</a>
        </div>
        <h2>✏️ განცხადების რედაქტირება</h2>
        <p class="subtitle">შეცვალეთ ან განაახლეთ განცხადების მონაცემები</p>

        <form id="editListingForm">
            
            <div class="form-section">
                <h3>1. ძირითადი ინფორმაცია</h3>
                <div class="input-group">
                    <label>სახელწოდება</label>
                    <input type="text" id="listTitle" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>მდებარეობა</label>
                        <select id="listLocation" required>
                            <option value="თბილისი">თბილისი</option>
                            <option value="ბათუმი">ბათუმი</option>
                            <option value="ქუთაისი">ქუთაისი</option>
                            <option value="ბაკურიანი">ბაკურიანი</option>
                            <option value="გუდაური">გუდაური</option>
                            <option value="მესტია">მესტია</option>
                            <option value="ბორჯომი">ბორჯომი</option>
                            <option value="თელავი">თელავი</option>
                            <option value="სიღნაღი">სიღნაღი</option>
                            <option value="მცხეთა">მცხეთა</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>ოთახები</label>
                        <input type="number" id="listRooms" required min="1">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>ფართობი (მ²)</label>
                        <input type="number" id="listArea" required min="5">
                    </div>
                    <div class="input-group">
                        <label>ფასი 1 ღამეში (₾)</label>
                        <input type="number" id="listPrice" required min="1">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>2. კეთილმოწყობა და სერვისები</h3>
                <div class="amenities-grid">
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="WiFi"> WiFi</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="კონდიციონერი"> კონდიციონერი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ცენტრალური გათბობა"> ცენტრალური გათბობა</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ტელევიზორი"> ტელევიზორი (Smart TV)</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="სარეცხი მანქანა"> სარეცხი მანქანა</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ფენი"> ფენი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="უთო"> უთო და საუთოო მაგიდა</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="თეთრეული და პირსახოცები"> თეთრეული / პირსახოცები</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ბუხარი"> ბუხარი</label>

                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="სამზარეულო"> სამზარეულო</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="მაცივარი"> მაცივარი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="მიკროტალღური ღუმელი"> მიკროტალღური ღუმელი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ჭურჭლის სარეცხი მანქანა"> ჭურჭლის სარეცხი მანქანა</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ყავის აპარატი"> ყავის აპარატი</label>

                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="აივანი"> აივანი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ტერასა / ეზო"> ტერასა / ეზო</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ზღვის ხედი"> ზღვის ხედი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="მთის ხედი"> მთის ხედი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ბარბექიუ / მაყალი"> ბარბექიუ / მაყალი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="სათხილამურო ტრასასთან ახლოს"> სათხილამურო ტრასასთან</label>

                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="პარკინგი"> უფასო პარკინგი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="აუზი"> აუზი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="საუნა / სპა"> საუნა / სპა</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="სპორტდარბაზი"> სპორტდარბაზი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="ლიფტი"> ლიფტი</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="24/7 დაცვა / რეცეფცია"> 24/7 დაცვა / რეცეფცია</label>

                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="შინაური ცხოველები დაშვებულია"> ცხოველები დაშვებულია</label>
                    <label class="custom-checkbox"><input type="checkbox" name="amenity" value="მოწევა დაშვებულია"> მოწევა დაშვებულია</label>
                </div>
            </div>

            <div class="form-section">
                <h3>3. კვების ოპციები</h3>
                <p class="subtitle">შეცვალეთ ან მიუთითეთ კვების საფასური 1 პერსონაზე (1 ღამით).</p>
                
                <div class="input-row">
                    <div class="meal-box">
                        <label>
                            <input type="checkbox" id="hasBreakfast" onchange="document.getElementById('priceBreakfast').disabled = !this.checked; if(!this.checked) document.getElementById('priceBreakfast').value='';"> 🥞 საუზმე
                        </label>
                        <input type="number" id="priceBreakfast" placeholder="ფასი (₾)" disabled>
                    </div>
                    
                    <div class="meal-box">
                        <label>
                            <input type="checkbox" id="hasHalfBoard" onchange="document.getElementById('priceHalfBoard').disabled = !this.checked; if(!this.checked) document.getElementById('priceHalfBoard').value='';"> 🍖 2-ჯერადი კვება
                        </label>
                        <input type="number" id="priceHalfBoard" placeholder="ფასი (₾)" disabled>
                    </div>

                    <div class="meal-box">
                        <label>
                            <input type="checkbox" id="hasFullBoard" onchange="document.getElementById('priceFullBoard').disabled = !this.checked; if(!this.checked) document.getElementById('priceFullBoard').value='';"> 🍲 3-ჯერადი კვება
                        </label>
                        <input type="number" id="priceFullBoard" placeholder="ფასი (₾)" disabled>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>4. ფოტოები და აღწერა</h3>
                <div class="input-group">
                    <label>ფოტოები (არსებულის წაშლა ან ახლის დამატება)</label>
                    <input type="file" id="listImages" accept="image/*" multiple>
                    <div id="imageGallery" class="image-gallery"></div> 
                </div>

                <div class="input-group">
                    <label>დეტალური აღწერა</label>
                    <textarea id="listDesc" rows="4" required></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn">ცვლილებების შენახვა</button>
        </form>
    </div>
    
    <script src="edit-listing-script.js"></script>
</body>
</html>
