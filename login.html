<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - სისტემაში შესვლა</title>
    <link rel="stylesheet" href="login-style.css">
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <a href="index.html" class="back-home">← მთავარ გვერდზე დაბრუნება</a>
    </div>

    <div class="login-box">
        <h2>სისტემაში შესვლა</h2>
        <p class="subtitle">მიუთითეთ თქვენი მონაცემები ავტორიზაციისთვის</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>ელ. ფოსტის მისამართი</label>
                <input type="email" id="email" required placeholder="giorgi@example.com">
            </div>
            
            <div class="input-group">
                <label class="password-label">პაროლი</label> 
                
                <div class="password-wrapper">
                    <input type="password" id="password" required placeholder="••••••••">
                    <button type="button" id="togglePassword" class="toggle-password-btn">
                        <svg id="eyeIcon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#a0c4bc" stroke-width="2" stroke-linecap="round">
                            <path d="M5 11a7 7 0 0 1 14 0" />
                            <circle cx="12" cy="13" r="3" />
                        </svg>
                    </button>
                </div>
                
                <a href="#" class="forgot-link">დაგავიწყდათ პაროლი?</a>
            </div>
            
            <button type="submit" class="submit-btn">შესვლა</button>
        </form>

        <div class="login-footer">
            <p>ახალი ხართ საიტზე? <a href="register.html">შექმენით ანგარიში</a></p>
        </div>
    </div>
</div>

</body>
</html>
