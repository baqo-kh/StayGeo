<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - დეტალები</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #f9f9f9;">

    <header style="background-color: #0b3127; padding: 15px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; align-items: center;">
            <a href="index.html" style="color: #a0c4bc; text-decoration: none; font-size: 15px; font-weight: bold;">← მთავარ გვერდზე დაბრუნება</a>
        </div>
    </header>

    <main class="sg-details-container">
        <div class="details-header">
            <h1 id="detTitle">იტვირთება...</h1>
            <p id="detLocation">📍 იტვირთება...</p>
        </div>

        <div class="details-gallery">
            <div class="main-image-box">
                <img id="detMainImg" src="" alt="მთავარი ფოტო">
            </div>
            <div class="thumbnails" id="detThumbnails">
                </div>
        </div>

        <div class="details-content-split">
            
            <div class="left-info">
                <div class="stats-row">
                    <span id="detArea">📏 0 მ²</span>
                    <span id="detRooms">🛏️ 0 ოთახი</span>
                </div>

                <div class="info-section">
                    <h3>აღწერა</h3>
                    <p id="detDesc">აღწერა იტვირთება...</p>
                </div>

                <div class="info-section">
                    <h3>კეთილმოწყობა და სერვისები</h3>
                    <div class="amenities-list" id="detAmenities">
                        </div>
                </div>
            </div>

            <div class="right-sidebar">
                <div class="booking-card">
                    <div class="price-header">
                        <span class="price-val" id="detPrice">0₾</span>
                        <span class="price-night">/ ღამე</span>
                    </div>
                    <hr>
                    <button class="contact-btn">დაუკავშირდით მასპინძელს</button>
                    <p class="safe-text">🔒 უსაფრთხო გარიგება StayGeo-ს გავლით</p>
                </div>
            </div>

        </div>
    </main>

    <script src="details-script.js"></script>
</body>
</html>
