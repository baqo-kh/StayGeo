<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - განცხადების დეტალები</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="listing-details-page">

    <header class="details-header-nav">
        <div class="details-header-container">
            <a href="index.html" class="logo-link">
                <img src="logo.svg" alt="StayGeo Logo" class="header-logo">
            </a>
            <a href="index.html" class="back-link">← მთავარ გვერდზე დაბრუნება</a>
        </div>
    </header>

    <main class="sg-details-container">
        <div class="details-main-content">
            <div class="left-info">
                
                <div class="details-header">
                    <h1 id="detailTitle">იტვირთება...</h1>
                    <div class="location-line">
                        <span class="flag-icon">📍</span>
                        <p id="detailLocation">იტვირთება...</p>
                    </div>
                </div>

                <div class="details-gallery">
                    <div class="main-image-box">
                        <img id="detailMainImg" src="" alt="მთავარი ფოტო">
                    </div>
                    <div class="thumbnails" id="detailThumbnails"></div>
                </div>

                <div class="listing-stats-tags">
                    <span id="detailArea">📏 -- მ²</span>
                    <span id="detailRooms">🛏️ -- ოთახი</span>
                </div>

                <div class="info-section">
                    <h3>აღწერა</h3>
                    <p id="detailDesc">იტვირთება...</p>
                </div>

                <div class="info-section">
                    <h3>კეთილმოწყობა და სერვისები</h3>
                    <div class="amenities-grid" id="detailAmenities"></div>
                </div>
            </div>

            <aside class="right-sidebar">
                <div class="booking-card">
                    <div class="price-header">
                        <span class="price-val" id="detailPrice">--₾</span> 
                        <span class="price-night">/ ღამე</span>
                    </div>

                    <form class="booking-form" id="bookingForm">
                        <div class="form-group">
                            <label>შესვლა</label>
                            <input type="date" id="checkIn" class="date-input" required>
                        </div>
                        <div class="form-group">
                            <label>გასვლა</label>
                            <input type="date" id="checkOut" class="date-input" required>
                        </div>
                        <div class="form-group">
                            <label>სტუმარი</label>
                            <input type="number" id="guestCount" class="date-input" value="1" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>კვება (1 პერსონა/ღამე)</label>
                            <select id="mealSelect" class="date-input">
                                <option value="0">კვების გარეშე - 0₾</option>
                            </select>
                        </div>
                    </form>

                    <hr>

                    <div class="price-details" id="calcDetails">
                        <p id="calcRoom">-- ₾ x -- ღამე = -- ₾</p>
                        <p id="calcMeal">კვება: 0 ₾ x 1 სტუმარი x -- ღამე = 0 ₾</p>
                    </div>

                    <div class="total-price" id="totalPriceDisplay">სულ გადასახდელი: -- ₾</div>

                    <button class="pay-online-btn">💳 ონლაინ გადახდა</button>
                    <button class="pay-cash-btn">💵 ადგილზე გადახდა</button>
                    
                    <p class="safe-text">თანხა გადაიხდება უსაფრთხოდ StayGeo-ს გავლით.</p>
                </div>
            </aside>
        </div>
    </main>

    <script src="details-script.js"></script>
</body>
</html>
