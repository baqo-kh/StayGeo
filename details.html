<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - განცხადების დეტალები</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="listing-details-page">

    <header class="details-header-nav">
        <div class="details-header-container">
            <a href="index.html" class="logo-link">
                <img src="logo.svg" alt="StayGeo Logo" class="header-logo">
            </a>
            <a href="index.html" class="back-link">← მთავარ გვერდზე დაბრუნება</a>
        </div>
    </header>

    <main class="sg-details-container">
        <div class="details-main-content">
            <div class="left-info">
                
                <div class="details-header">
                    <h1 id="detailTitle">იტვირთება...</h1>
                    <div class="location-line">
                        <span class="flag-icon">📍</span>
                        <p id="detailLocation">იტვირთება...</p>
                    </div>
                </div>

                <div class="details-gallery">
                    <div class="main-image-box">
                        <img id="detailMainImg" src="" alt="მთავარი ფოტო">
                    </div>
                    <div class="thumbnails" id="detailThumbnails"></div>
                </div>

                <div class="listing-stats-tags">
                    <span id="detailArea">📏 -- მ²</span>
                    <span id="detailRooms">🛏️ -- ოთახი</span>
                </div>

                <div class="info-section">
                    <h3>აღწერა</h3>
                    <p id="detailDesc">იტვირთება...</p>
                </div>

                <div class="info-section">
                    <h3>კეთილმოწყობა და სერვისები</h3>
                    <div class="amenities-grid" id="detailAmenities"></div>
                </div>
            </div>

            <aside class="right-sidebar">
                <div class="booking-card">
                    <div class="price-header">
                        <span class="price-val" id="detailPrice">--₾</span> 
                        <span class="price-night">/ ღამე</span>
                    </div>

                    <form class="booking-form" id="bookingForm">
                        
                        <div class="form-group" id="roomTypeGroup" style="display: none;">
                            <label>აირჩიეთ ოთახის ტიპი</label>
                            <select id="bookingRoomSelect" class="date-input"></select>
                        </div>

                        <div class="form-group">
                            <label>შესვლა</label>
                            <input type="text" id="checkIn" class="date-input" placeholder="აირჩიეთ თარიღი" required>
                        </div>
                        <div class="form-group">
                            <label>გასვლა</label>
                            <input type="text" id="checkOut" class="date-input" placeholder="აირჩიეთ თარიღი" required>
                        </div>
                        <div class="form-group">
                            <label>სტუმარი</label>
                            <input type="number" id="guestCount" class="date-input" value="1" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>კვება (1 პერსონა/ღამე)</label>
                            <select id="mealSelect" class="date-input">
                                <option value="0">კვების გარეშე - 0₾</option>
                            </select>
                        </div>
                    </form>

                    <hr>

                    <div class="price-details" id="calcDetails">
                        <p id="calcRoom">-- ₾ x -- ღამე = -- ₾</p>
                        <p id="calcMeal">კვება: 0 ₾ x 1 სტუმარი x -- ღამე = 0 ₾</p>
                    </div>

                    <div class="total-price" id="totalPriceDisplay">სულ გადასახდელი: -- ₾</div>

                    <button id="bookBtn" style="width: 100%; background: #0b3127; color: #febb02; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; transition: 0.2s; box-shadow: 0 4px 10px rgba(11, 49, 39, 0.2);">დაჯავშნა</button>
                    
                    <p class="safe-text" style="text-align: center; margin-top: 15px; font-size: 13px; color: #666;">
                        თანხა გადაიხდება უსაფრთხოდ StayGeo-ს გავლით.
                    </p>
                </div>
            </aside>
        </div>
    </main>

    <div id="successModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
            <h3 style="color: #0b3127; margin-bottom: 15px; font-size: 22px;">🎉 ჯავშანი მიღებულია!</h3>
            <div id="modalContent" style="color: #4a4a4a; line-height: 1.6; font-size: 15px; text-align: left; background: #fafafa; padding: 15px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 20px;">
                </div>
            <button id="closeModalBtn" style="background: #febb02; color: #0b3127; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 15px; width: 100%; transition: 0.2s;">დახურვა</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ka.js"></script>
    
    <script src="details-script.js"></script>
</body>
</html>
