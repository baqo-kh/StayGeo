<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - განცხადების დამატება</title>
    <link rel="stylesheet" href="css/add-listing-style.css"> 
</head>
<body>
    <div class="add-listing-container">
        <div class="header-link">
            <a href="index.html">← მთავარ გვერდზე დაბრუნება</a>
        </div>
        <h2>ახალი განცხადება</h2>
        <p class="subtitle">შეავსეთ დეტალები თქვენი ადგილის შესახებ</p>

        <form id="addListingForm">
            
            <div class="form-section">
                <h3>1. ძირითადი ინფორმაცია</h3>
                <div class="input-group">
                    <label>სახელწოდება</label>
                    <input type="text" id="listTitle" required placeholder="მაგ: მყუდრო კოტეჯი ცენტრში">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>მდებარეობა</label>
                        <select id="listLocation" required>
                            <option value="" disabled selected>აირჩიეთ...</option>
                            <option value="თბილისი">თბილისი</option>
                            <option value="ბათუმი">ბათუმი</option>
                            <option value="ქუთაისი">ქუთაისი</option>
                            <option value="ბაკურიანი">ბაკურიანი</option>
                            <option value="გუდაური">გუდაური</option>
                            <option value="მესტია">მესტია</option>
                            <option value="ბორჯომი">ბორჯომი</option>
                            <option value="თელავი">თელავი</option>
                            <option value="სიღნაღი">სიღნაღი</option>
                            <option value="მცხეთა">მცხეთა</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>ოთახები</label>
                        <input type="number" id="listRooms" required min="1" placeholder="მაგ: 2">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>ფართობი (მ²)</label>
                        <input type="number" id="listArea" required min="5" placeholder="მაგ: 50">
                    </div>
                    <div class="input-group">
                        <label>ფასი 1 ღამეში (₾)</label>
                        <input type="number" id="listPrice" required min="1" placeholder="მაგ: 150">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>კეთილმოწყობა და სერვისები</label>
                <div class="amenities-grid" style="grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));">
                    
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="WiFi"> WiFi</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="კონდიციონერი"> კონდიციონერი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ცენტრალური გათბობა"> ცენტრალური გათბობა</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ტელევიზორი"> ტელევიზორი (Smart TV)</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="სარეცხი მანქანა"> სარეცხი მანქანა</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ფენი"> ფენი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="უთო"> უთო და საუთოო მაგიდა</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="თეთრეული და პირსახოცები"> თეთრეული / პირსახოცები</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ბუხარი"> ბუხარი</label>

                    <label class="amenity-label"><input type="checkbox" name="amenity" value="სამზარეულო"> სამზარეულო</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="მაცივარი"> მაცივარი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="მიკროტალღური ღუმელი"> მიკროტალღური ღუმელი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ჭურჭლის სარეცხი მანქანა"> ჭურჭლის სარეცხი მანქანა</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ყავის აპარატი"> ყავის აპარატი</label>

                    <label class="amenity-label"><input type="checkbox" name="amenity" value="აივანი"> აივანი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ტერასა / ეზო"> ტერასა / ეზო</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ზღვის ხედი"> ზღვის ხედი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="მთის ხედი"> მთის ხედი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ბარბექიუ / მაყალი"> ბარბექიუ / მაყალი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="სათხილამურო ტრასასთან ახლოს"> სათხილამურო ტრასასთან</label>

                    <label class="amenity-label"><input type="checkbox" name="amenity" value="პარკინგი"> უფასო პარკინგი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="აუზი"> აუზი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="საუნა / სპა"> საუნა / სპა</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="სპორტდარბაზი"> სპორტდარბაზი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="ლიფტი"> ლიფტი</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="24/7 დაცვა / რეცეფცია"> 24/7 დაცვა / რეცეფცია</label>

                    <label class="amenity-label"><input type="checkbox" name="amenity" value="შინაური ცხოველები დაშვებულია"> ცხოველები დაშვებულია</label>
                    <label class="amenity-label"><input type="checkbox" name="amenity" value="მოწევა დაშვებულია"> მოწევა დაშვებულია</label>
                </div>
            </div>

            <div class="form-section">
                <h3>3. კვება</h3>
                <label class="custom-checkbox toggle-meal">
                    <input type="checkbox" id="hasMeals">
                    <span>ობიექტზე შესაძლებელია კვების დამატება</span>
                </label>
                
                <div id="mealOptions" style="display: none; margin-top: 15px; padding-left: 15px; border-left: 2px solid #febb02;">
                    <div class="input-row">
                        <div class="input-group">
                            <label>კვების ტიპი</label>
                            <select id="mealType">
                                <option value="საუზმე">მხოლოდ საუზმე</option>
                                <option value="2-ჯერადი">2-ჯერადი კვება</option>
                                <option value="3-ჯერადი">3-ჯერადი კვება</option>
                                <option value="All-Inclusive">All-Inclusive (ყველაფერი შედის)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>ფასი 1 პერსონაზე (₾)</label>
                            <input type="number" id="mealPrice" min="0" placeholder="0 = შედის მთავარ ფასში">
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>4. ფოტოები და აღწერა</h3>
                <div class="input-group">
                    <label>ატვირთეთ სურათები (შეგიძლიათ ერთდროულად რამდენიმეს არჩევა)</label>
                    <input type="file" id="listImages" accept="image/*" multiple>
                    <div id="imageGallery" class="image-gallery"></div> 
                </div>

                <div class="input-group">
                    <label>აღწერა</label>
                    <textarea id="listDesc" rows="4" required placeholder="მოკლედ აღწერეთ ადგილი და მისი უპირატესობები..."></textarea>
                </div>
            </div>

            <button type="submit" class="submit-btn">განცხადების გამოქვეყნება</button>
        </form>
    </div>
    
    <script src="add-listing-script.js"></script>
</body>
</html>
