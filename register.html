<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - რეგისტრაცია</title>
    <link rel="stylesheet" href="css/register-style.css">
</head>
<body>

    <div class="reg-container">
        <div class="login-header">
            <a href="index.html" class="back-home">← მთავარ გვერდზე დაბრუნება</a>
        </div>
        
        <h2>რეგისტრაცია</h2>
        <p class="subtitle">შექმენით ანგარიში StayGeo.ge-ზე</p>

        <form id="registerForm">
            <div class="input-row">
                <div class="input-group">
                    <label>სახელი</label>
                    <input type="text" id="regFirstName" required>
                </div>
                <div class="input-group">
                    <label>გვარი</label>
                    <input type="text" id="regLastName" required>
                </div>
            </div>

            <div class="input-group">
                <label>ტელეფონის ნომერი</label>
                <div style="display: flex; gap: 8px; height: 50px;">
                    <div class="custom-select-wrapper">
                        <div id="selectedCountry" class="custom-select-trigger">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <img id="selectedFlag" src="https://flagcdn.com/w20/ge.png" alt="ge">
                                <span id="selectedCodeText">+995</span>
                            </div>
                            <span>▼</span>
                        </div>
                        <div id="countryDropdown" class="custom-options">
                            <div class="search-box">
                                <input type="text" id="countrySearch" placeholder="მოძებნე ქვეყანა..." autocomplete="off">
                            </div>
                            <div id="countryList" class="country-list-container"></div>
                        </div>
                    </div>
                    <input type="hidden" id="regCountryCodeInput" value="+995">
                    <input type="tel" id="regPhone" required placeholder="599 12 34 56" style="flex: 1;">
                </div>
            </div>

            <div class="input-group">
                <label>ელ-ფოსტა</label>
                <input type="email" id="regEmail" required placeholder="name@example.com">
            </div>

            <div class="input-group">
                <label>პაროლი</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassword" required minlength="6" placeholder="მინიმუმ 6 სიმბოლო">
                    <button type="button" id="togglePassword" class="toggle-password-btn" onclick="togglePasswordVisibility()">
                        <svg id="eyeIcon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#a0c4bc" stroke-width="2" stroke-linecap="round">
                            <path d="M5 11a7 7 0 0 1 14 0" />
                            <circle cx="12" cy="13" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="action-btn">რეგისტრაცია</button>

            <div class="login-footer">
                <span>უკვე გაქვთ ანგარიში? </span>
                <a href="login.html">შესვლა</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://volwthkudypgvlafbdqf.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_IDi82Onln8r5EQ3ZH-u-Ow__ugEm86U"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // პაროლის ჩვენება/დამალვის ფუნქცია
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('regPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `<path d="M5 11a7 7 0 0 1 14 0" /><circle cx="12" cy="13" r="3" /><line x1="3" y1="3" x2="21" y2="21" stroke="#ff6b6b" stroke-width="2"/>`;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `<path d="M5 11a7 7 0 0 1 14 0" /><circle cx="12" cy="13" r="3" />`;
            }
        }
    </script>
    <script src="register-script.js"></script>
</body>
</html>
