<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - რეგისტრაცია</title>
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .custom-select-wrapper {
            position: relative;
            width: 140px;
            user-select: none;
        }
        .custom-select-trigger {
            background-color: #0b3127;
            border: 1px solid #1a5142;
            padding: 13px 10px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
        }
        .custom-select-trigger img { width: 20px; border-radius: 2px; }
        
        .custom-options {
            position: absolute;
            display: none;
            top: 100%;
            left: 0;
            width: 220px; /* სია ცოტა გავაგანიერეთ, რომ ძებნის ველი დაეტიოს */
            background-color: #0b3127;
            border: 1px solid #1a5142;
            border-radius: 8px;
            margin-top: 5px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        /* 🔍 ძებნის ველის სტილები */
        .search-box {
            padding: 10px;
            background-color: #0d3b2f;
            border-bottom: 1px solid #1a5142;
            position: sticky;
            top: 0;
            z-index: 101;
        }
        .search-box input {
            width: 100%;
            background-color: #0b3127;
            border: 1px solid #1a5142;
            color: white;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
        }
        .search-box input:focus { border-color: #febb02; }

        .country-list-container {
            max-height: 200px;
            overflow-y: auto;
        }
        .custom-option {
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .custom-option:hover { background-color: #1a5142; }
        .custom-option img { width: 20px; border-radius: 2px; }
        
        .country-list-container::-webkit-scrollbar { width: 6px; }
        .country-list-container::-webkit-scrollbar-thumb { background: #1a5142; border-radius: 4px; }
    </style>
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #0b3127; margin: 0; padding: 20px;">

    <div style="background-color: #0d3b2f; width: 100%; max-width: 450px; padding: 40px; border-radius: 16px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4); box-sizing: border-box;">
        
        <div style="margin-bottom: 30px;">
            <a href="index.html" style="color: #a0c4bc; text-decoration: none; font-size: 14px; font-weight: 500;">← მთავარ გვერდზე დაბრუნება</a>
        </div>
        
        <h2 style="font-size: 28px; color: #febb02; margin: 0 0 8px 0; font-weight: 700;">რეგისტრაცია</h2>
        <p style="font-size: 14px; color: #a0c4bc; margin: 0 0 30px 0;">შექმენით ანგარიში StayGeo.ge-ზე</p>

        <form id="registerForm">
            
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label style="font-size: 13px; color: #a0c4bc; margin-bottom: 8px; display: block;">სახელი</label>
                    <input type="text" id="regFirstName" required style="width: 100%; background-color: #0b3127; border: 1px solid #1a5142; padding: 14px; border-radius: 8px; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 13px; color: #a0c4bc; margin-bottom: 8px; display: block;">გვარი</label>
                    <input type="text" id="regLastName" required style="width: 100%; background-color: #0b3127; border: 1px solid #1a5142; padding: 14px; border-radius: 8px; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box;">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-size: 13px; color: #a0c4bc; margin-bottom: 8px; display: block;">ტელეფონის ნომერი</label>
                <div style="display: flex; gap: 8px; height: 50px;">
                    
                    <div class="custom-select-wrapper">
                        <div id="selectedCountry" class="custom-select-trigger">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <img id="selectedFlag" src="https://flagcdn.com/w20/ge.png" alt="ge">
                                <span id="selectedCodeText">+995</span>
                            </div>
                            <span style="font-size: 10px; color: #a0c4bc;">▼</span>
                        </div>
                        
                        <div id="countryDropdown" class="custom-options">
                            <div class="search-box">
                                <input type="text" id="countrySearch" placeholder="მოძებნე ქვეყანა..." autocomplete="off">
                            </div>
                            <div id="countryList" class="country-list-container"></div>
                        </div>
                    </div>
                    
                    <input type="hidden" id="regCountryCodeInput" value="+995">
                    <input type="tel" id="regPhone" required placeholder="599 12 34 56" style="flex: 1; background-color: #0b3127; border: 1px solid #1a5142; padding: 14px; border-radius: 8px; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box; height: 100%;">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-size: 13px; color: #a0c4bc; margin-bottom: 8px; display: block;">ელ-ფოსტა</label>
                <input type="email" id="regEmail" required placeholder="name@example.com" style="width: 100%; background-color: #0b3127; border: 1px solid #1a5142; padding: 14px; border-radius: 8px; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box;">
            </div>

            <div style="margin-bottom: 30px; position: relative;">
                <label style="font-size: 13px; color: #a0c4bc; margin-bottom: 8px; display: block;">პაროლი</label>
                <input type="password" id="regPassword" required minlength="6" placeholder="მინიმუმ 6 სიმბოლო" style="width: 100%; background-color: #0b3127; border: 1px solid #1a5142; padding: 14px; border-radius: 8px; color: #ffffff; font-size: 15px; outline: none; box-sizing: border-box; padding-right: 45px;">
            </div>

            <button type="submit" id="submitBtn" style="width: 100%; padding: 16px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; background-color: #febb02; color: #0b3127; transition: background-color 0.2s;">
                რეგისტრაცია
            </button>

            <div style="text-align: center; margin-top: 25px;">
                <span style="color: #a0c4bc; font-size: 14px;">უკვე გაქვთ ანგარიში? </span>
                <a href="login.html" style="color: #febb02; text-decoration: none; font-weight: bold; font-size: 14px;">შესვლა</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    </script>
    
    <script src="register-script.js"></script>
</body>
</html>
