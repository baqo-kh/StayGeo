<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayGeo.ge - ჩემი პროფილი</title>
    <link rel="stylesheet" href="css/style.css"> 
    <style>
        .profile-wrapper {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .profile-sidebar {
            width: 250px;
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .profile-sidebar button {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .profile-sidebar button:hover {
            background: #f5f5f5;
        }
        .profile-sidebar button.active {
            background: #0b3127;
            color: #febb02;
        }
        .profile-sidebar button.logout-btn {
            color: #ff3b30;
            margin-top: 20px;
        }
        .profile-sidebar button.logout-btn:hover {
            background: #ffebee;
        }

        .profile-content {
            flex: 1;
            background: #ffffff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .profile-content h2 {
            margin-top: 0;
            color: #0b3127;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .avatar-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ffffff;
            object-fit: cover;
            border: 1px solid #ddd; 
        }
        .upload-avatar-btn {
            background: #febb02;
            color: #0b3127;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
            transition: 0.2s;
        }
        .upload-avatar-btn:hover {
            background: #e5a800;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }
        .input-group input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }
        .save-btn {
            background: #0b3127;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            width: auto;
        }

        @media (max-width: 768px) {
            .profile-wrapper { flex-direction: column; }
            .profile-sidebar { width: 100%; box-sizing: border-box; }
            .profile-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body style="background: #f8f9fa; margin: 0; font-family: system-ui, -apple-system, sans-serif;">

    <header style="background: #0b3127; padding: 15px 20px; text-align: left; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; min-height: 85px;">
        <div style="display: flex; align-items: center; gap: 30px;">
            <a href="index.html" style="display: inline-block;">
                <img src="logo.svg" alt="StayGeo Logo" style="height: 55px; display: block;">
            </a>
            
            <a href="index.html" style="color: white; text-decoration: none; font-weight: bold; font-size: 14px; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; display: flex; align-items: center; gap: 8px; transition: 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">
                <span style="font-size: 18px; line-height: 1;">←</span> მთავარი გვერდი
            </a>
        </div>
    </header>

    <div class="profile-wrapper">
        
        <aside class="profile-sidebar">
            <button class="active">👤 ჩემი მონაცემები</button>
            <button class="logout-btn" onclick="logoutUser()">🚪 სისტემიდან გასვლა</button>
        </aside>

        <main class="profile-content">
            <h2>პირადი ინფორმაცია</h2>
            
            <form id="profileForm">
                
                <div class="avatar-section">
                    <img src="" alt="" class="avatar-preview" id="avatarPreview">
                    <div>
                        <label for="avatarInput" class="upload-avatar-btn">ფოტოს შეცვლა</label>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="profile-grid">
                    <div class="input-group">
                        <label>სახელი</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="input-group">
                        <label>გვარი</label>
                        <input type="text" id="lastName" required>
                    </div>
                    <div class="input-group">
                        <label>ელ-ფოსტა</label>
                        <input type="email" id="emailAddress" required>
                    </div>
                    <div class="input-group">
                        <label>ტელეფონის ნომერი</label>
                        <input type="tel" id="phoneNumber" placeholder="მაგ: 555 12 34 56">
                    </div>
                </div>

                <button type="submit" class="save-btn">ცვლილებების შენახვა</button>
            </form>
        </main>

    </div>

    <script type="module" src="profile-script.js"></script>
</body>
</html>
