<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sg-hero-section">
        
        <header class="sg-header-nav">
        <a href="inex.html" class="logo-link">
  <!-- ზომა კიდევ უფრო გაიზარდა (width="260" height="65") -->
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="260" height="65">
    <defs>
      <!-- ქმნის ნამდვილ გამჭვირვალე ხვრელს პინის ცენტრში -->
      <mask id="pin-hole-mask">
        <rect x="-30" y="-80" width="60" height="90" fill="white" />
        <circle cx="0" cy="-50" r="7" fill="black" />
      </mask>
    </defs>

    <!-- ერთიანი ყვითელი ტექსტი ბუნებრივი დაშორებებით -->
    <text x="10" y="46" fill="#febb02" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Montserrat', sans-serif" font-weight="900" font-size="33" letter-spacing="-0.5">StayGeo.ge</text>

    <!-- თეთრი პინი ნამდვილი ხვრელით, ზუსტად G-ს თავზე შეხებით -->
    <g transform="translate(90, 19) scale(0.19)" fill="#ffffff" mask="url(#pin-hole-mask)">
      <path d="M0 0 C-16 -19 -26 -34 -26 -50 A 26 24 0 1 1 26 -50 C 26 -34 16 -19 0 0 Z"/>
    </g>
  </svg>
</a>
            <div class="sg-nav-actions"> <div class="language-switcher">
        </div>
    
    <div class="nav-links">
    <a href="login.html" style="text-decoration: none;">
        <button class="login-btn">შესვლა</button>
    </a>

    <a href="register.html" style="text-decoration: none;">
        <button class="register-btn">რეგისტრაცია</button>
    </a>
</div>
        </header>

        <div class="sg-hero-container">
            <h1 class="sg-hero-title">იპოვე შენი შემდეგი დასასვენებელი ადგილი</h1>
            <p class="sg-hero-subtitle">აღმოაჩინე საუკეთესო შემოთავაზებები საქართველოში</p>
            
            <div class="sg-search-zone">
                <div class="sg-search-bar-box">
                    <form class="sg-search-inner-form" onsubmit="event.preventDefault();">
                        
                        <div class="sg-input-block sg-block-dest" id="sgDestBlock">
                            <span class="sg-block-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a4a4a" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                            </span>
                            <input type="text" class="sg-main-input" id="sgDestInput" placeholder="სად მიდიხართ?" autocomplete="off">
                            <div class="sg-location-dropdown" id="sgLocDropdown"></div>
                        </div>

                        <div class="sg-input-block sg-block-date" id="sgDateBlock">
                            <span class="sg-block-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a4a4a" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            </span>
                            <div class="sg-date-labels">
                                <span id="sgCheckInLabel">შესვლის თარიღი</span>
                                <span class="sg-date-sep">—</span>
                                <span id="sgCheckOutLabel">გასვლის თარიღი</span>
                            </div>

                            <div class="sg-exact-calendar-pop" id="sgCalPop">
                                <div class="sg-pop-months-flex" id="sgCalMonthsContainer"></div>
                            </div>
                        </div>

                        <div class="sg-input-block sg-block-guests" id="sgGuestsBlock">
                            <div class="sg-guests-left">
                                <span class="sg-block-icon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a4a4a" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                </span>
                                <span class="sg-guests-val" id="sgGuestsDisplay">2 ზრდასრული · 0 ბავშვი · 1 ოთახი</span>
                            </div>
                            <span class="sg-chevron-down">▼</span>

                            <div class="sg-guests-dropdown" id="sgGuestsDropdown">
                                <div class="sg-dropdown-row">
                                    <span class="sg-row-label">ზრდასრული</span>
                                    <div class="sg-counter-box">
                                        <button type="button" class="sg-counter-btn" id="btnAdultMinus">-</button>
                                        <span class="sg-counter-value" id="valAdults">2</span>
                                        <button type="button" class="sg-counter-btn" id="btnAdultPlus">+</button>
                                    </div>
                                </div>
                                <div class="sg-dropdown-row">
                                    <span class="sg-row-label">ბავშვი</span>
                                    <div class="sg-counter-box">
                                        <button type="button" class="sg-counter-btn" id="btnChildMinus">-</button>
                                        <span class="sg-counter-value" id="valChildren">0</span>
                                        <button type="button" class="sg-counter-btn" id="btnChildPlus">+</button>
                                    </div>
                                </div>
                                <div class="sg-dropdown-row">
                                    <span class="sg-row-label">ოთახი</span>
                                    <div class="sg-counter-box">
                                        <button type="button" class="sg-counter-btn" id="btnRoomMinus">-</button>
                                        <span class="sg-counter-value" id="valRooms">1</span>
                                        <button type="button" class="sg-counter-btn" id="btnRoomPlus">+</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="sg-main-search-btn">ძებნა</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
<button class="help-center-btn" id="helpBtn" title="დახმარების ცენტრი">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
    </svg>
</button>

<div class="help-popup" id="helpPopup">
    <div class="popup-header">
        <div class="header-title">
            <span>🎧</span>
            <h3>დახმარების ცენტრი</h3>
        </div>
        <button class="close-popup" id="closeHelpBtn">&times;</button>
    </div>
    
    <div class="popup-body">
        <p>მოგესალმებით! შეგიძლიათ აღწეროთ პრობლემა და საჭიროების შემთხვევაში ატვირთოთ ფოტო/სკრინშოტი.</p>
        
        <form id="helpForm">
            <textarea id="helpQuestion" placeholder="ჩაწერეთ თქვენი კითხვა..." required></textarea>
            
            <div id="filePreviewContainer" class="file-preview-container">
                <span id="fileNameDisplay"></span>
                <button type="button" id="removeFileBtn">&times;</button>
            </div>

            <div class="form-controls">
                <label for="fileUpload" class="file-upload-label" title="ფაილის მიბმა">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                    </svg>
                    <span>მიაბით ფაილი</span>
                </label>
                <input type="file" id="fileUpload" accept="image/*,application/pdf" style="display: none;">
                
                <button type="submit" class="send-btn">გაგზავნა</button>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    console.log("🎧 დახმარების ცენტრის სკრიპტი წარმატებით ჩაიტვირთა!");

    const helpBtn = document.getElementById('helpBtn');
    const helpPopup = document.getElementById('helpPopup');
    const closeHelpBtn = document.getElementById('closeHelpBtn');
    const helpForm = document.getElementById('helpForm');
    const helpQuestion = document.getElementById('helpQuestion');
    const fileUpload = document.getElementById('fileUpload');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const removeFileBtn = document.getElementById('removeFileBtn');

    if (!helpBtn || !helpPopup) {
        console.error("❌ შეცდომა: HTML ელემენტები 'helpBtn' ან 'helpPopup' ვერ მოიძებნა!");
        return;
    }

    // ფანჯრის გახსნა / ჩაკეტვა
    helpBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        console.log("🔘 ლურჯ ღილაკს დაეჭირა!");
        helpPopup.classList.toggle('active');
        console.log("ფანჯარა აქტიურია:", helpPopup.classList.contains('active'));
    });

    closeHelpBtn.addEventListener('click', () => {
        helpPopup.classList.remove('active');
    });

    document.addEventListener('click', (e) => {
        if (!helpPopup.contains(e.target) && e.target !== helpBtn) {
            helpPopup.classList.remove('active');
        }
    });

    // ფაილის მიბმა
    fileUpload.addEventListener('change', () => {
        if (fileUpload.files.length > 0) {
            fileNameDisplay.textContent = `📎 ${fileUpload.files[0].name}`;
            filePreviewContainer.style.display = 'flex';
        }
    });

    // ფაილის წაშლა
    removeFileBtn.addEventListener('click', () => {
        fileUpload.value = '';
        filePreviewContainer.style.display = 'none';
        fileNameDisplay.textContent = '';
    });

    // ფორმის გაგზავნა
    helpForm.addEventListener('submit', (e) => {
        e.preventDefault();
        alert("✅ თქვენი შეტყობინება წარმატებით გაიგზავნა!");
        helpQuestion.value = '';
        fileUpload.value = '';
        filePreviewContainer.style.display = 'none';
        helpPopup.classList.remove('active');
    });
});
</script>
    
    
    <script src="script.js"></script>

</body>
</html>
